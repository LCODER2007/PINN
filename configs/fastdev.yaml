# ── Fast development config — small model, few epochs ──

seed: 42
project_name: "pinn_acoustic_fwi_fastdev"

data:
  vp_path: /root/FWI/pinn_acoustic_fwi/data/processed/marmousi_vp.npy
  observed_path: "data/synthetic/observed_acoustic.npy"
  geometry_path: "data/synthetic/acquisition_geometry.npz"

model:
  subsample: 4
  vp_min: 1500.0
  vp_max: 4700.0

acquisition:
  n_shots: 8
  nt: 1000
  dt: 0.0004
  f_peak: 8.0
  dh: 5.0
  src_depth_idx: 5
  rec_depth_idx: 5
  pad_x: 4
  receiver_stride: 2
  backend: "deepwave"

pinn:
  in_dim: 4                
  n_shots: 8
  hidden_layers: 6
  hidden_width: 128
  activation: "sin"
  first_omega_0: 30.0
  hidden_omega_0: 30.0
  fourier_features: false
  fourier_scale: 10.0
  n_fourier: 64
  hard_constraint: "exp"
  hard_constraint_scale: 1.0
  hard_constraint_power: 2

velocity_net:
  hidden_layers: 4
  hidden_width: 128
  activation: "tanh"
  fourier_features: true
  n_fourier: 64
  fourier_scale: 8.0
  output_activation: "sigmoid"

training:
  n_epochs: 1000
  warmup_epochs: 50
  lr_pinn: 2.0e-4
  lr_vp: 1.0e-4
  alternating_updates: true
  warmup_pinn_only_epochs: 50
  pinn_steps_per_cycle: 1
  vp_steps_per_cycle: 2
  use_frequency_continuation: true
  freq_start_hz: 2.0
  freq_end_hz: 10.0
  freq_ramp_epochs: 350
  n_data_receivers: 24
  data_normalization: "rms"
  scheduler_step: 500
  scheduler_gamma: 0.5
  grad_clip: 1.0
  grad_clip_value: 0.0
  skip_nonfinite_steps: true
  n_collocation: 50000
  n_bc: 800
  n_ic: 800
  n_data_batch: 1024
  shots_per_batch: 8
  source_bias_ratio: 0.25
  source_bias_sigma: 0.05
  source_sigma: 0.01
  source_amplitude: 1.0

weights:
  # After non-dimensionalization PDE terms are O(1).
  # Scheduler ramps PDE UP during warmup, then ramps data.
  w_pde_start: 0.1
  w_pde: 12.0
  w_data_start: 1.0
  w_data: 60.0
  w_ic_start: 50.0           # high IC weight early to anchor u(t=0)=0
  w_ic_end: 5.0
  w_bc: 0.1
  w_reg: 5e-4
  w_smooth: 2e-6
  w_tv: 2e-5
  w_charbonnier: 3e-5
  charbonnier_epsilon: 5.0
  charbonnier_alpha: 0.45
  w_bounds: 1e-3
  causal_epsilon: 5.0        # causal temporal weighting strength
  causal_chunks: 24
  causal_min_weight: 1e-3
  adaptive_data_weight: true
  data_weight_min_scale: 0.5
  data_weight_max_scale: 8.0
  data_weight_beta: 0.5

logging:
  print_every: 20
  plot_every: 50
  checkpoint_every: 100
  results_dir: "results"

device: "auto"
