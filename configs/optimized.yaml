# ── STABILIZED acoustic PINN-FWI configuration for safe convergence ──

seed: 42
project_name: "pinn_acoustic_fwi_optimized"

data:
  vp_path: "data/processed/marmousi_vp.npy"
  observed_path: "data/synthetic/observed_acoustic.npy"
  geometry_path: "data/synthetic/acquisition_geometry.npz"

model:
  subsample: 4
  vp_min: 1500.0
  vp_max: 4700.0

acquisition:
  n_shots: 8
  nt: 1000
  dt: 0.0004
  f_peak: 8.0
  dh: 5.0
  src_depth_idx: 5
  rec_depth_idx: 5
  pad_x: 4
  receiver_stride: 2
  backend: "deepwave"

pinn:
  in_dim: 4
  n_shots: 8
  hidden_layers: 6
  hidden_width: 128
  activation: "sin"
  first_omega_0: 30.0
  hidden_omega_0: 30.0
  fourier_features: false
  n_fourier: 64
  fourier_scale: 10.0
  hard_constraint: "exp"
  hard_constraint_scale: 1.5
  hard_constraint_power: 2

velocity_net:
  hidden_layers: 8
  hidden_width: 256
  activation: "tanh"
  fourier_features: true
  n_fourier: 128
  fourier_scale: 8.0
  output_activation: "sigmoid"

training:
  n_epochs: 3000
  warmup_epochs: 300
  lr_pinn: 5.0e-5            # LOWERED: Prevents wavefield bouncing
  lr_vp: 5.0e-5              # LOWERED: Prevents velocity model explosion
  alternating_updates: false
  warmup_pinn_only_epochs: 0
  pinn_steps_per_cycle: 1
  vp_steps_per_cycle: 1
  use_frequency_continuation: true
  freq_start_hz: 2.0
  freq_end_hz: 8.0
  freq_ramp_epochs: 2100
  n_data_receivers: 337
  data_normalization: "rms"
  scheduler_step: 500
  scheduler_gamma: 0.5
  grad_clip: 0.1             # TIGHTENED: Hard cap on gradient spikes
  grad_clip_value: 0.0
  skip_nonfinite_steps: true
  n_collocation: 30000
  n_bc: 3000
  n_ic: 3000
  n_data_batch: 8192
  shots_per_batch: 8
  source_bias_ratio: 0.35
  source_bias_sigma: 0.05
  source_sigma: 0.02
  source_amplitude: 1.0
  early_stopping_patience: 300
  active_receiver_rms_ratio: 0.02
  data_batch_all_shots: true
  use_well_prior: true
  well_position_fracs: [0.5]
  well_depth_frac: 0.75

weights:
  w_pde_start: 0.1           # LOWERED: Start gentle on physics
  w_pde: 1.0                 # LOWERED: Don't let PDE overpower the data
  w_data_start: 10.0         # RAISED: Force network to care about sensors early
  w_data: 20.0               # Strong final data weight
  w_ic_start: 20.0
  w_ic_end: 2.0
  w_bc: 0.2
  w_reg: 1.0e-4
  w_smooth: 1.0e-6           # Adjusted for better fault resolution
  w_tv: 1.0e-6               # Adjusted
  w_charbonnier: 1.0e-5
  charbonnier_epsilon: 5.0
  charbonnier_alpha: 0.45
  w_bounds: 1.0e-4
  w_well: 10.0
  causal_epsilon: 8.0
  causal_chunks: 32
  causal_min_weight: 5e-4
  adaptive_data_weight: true
  data_weight_min_scale: 0.3
  data_weight_max_scale: 10.0
  data_weight_beta: 0.5

logging:
  print_every: 50
  plot_every: 100
  checkpoint_every: 500
  results_dir: "results"

device: "auto"