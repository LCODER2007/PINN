# ── Marmousi acoustic PINN-FWI configuration ──

seed: 42
project_name: "pinn_acoustic_fwi"

# ── Data paths (relative to project root) ──
data:
  # Existing project data source (outside this package)
  vp_path: /root/FWI/pinn_acoustic_fwi/data/processed/marmousi_vp.npy

  # Package-local outputs
  observed_path: "data/synthetic/observed_acoustic.npy"
  geometry_path: "data/synthetic/acquisition_geometry.npz"

# ── Model subsampling ──
model:
  subsample: 4             # spatial subsample factor from full Marmousi
  vp_min: 1500.0
  vp_max: 4700.0

# ── Acquisition ──
acquisition:
  n_shots: 8
  nt: 1000
  dt: 0.0004
  f_peak: 8.0
  dh: 5.0                 # grid spacing in meters/cells for modeling
  src_depth_idx: 5
  rec_depth_idx: 5
  pad_x: 4
  receiver_stride: 4
  backend: "deepwave"    # deepwave | fd

# ── PINN architecture ──
pinn:
  in_dim: 4                
  n_shots: 8
  hidden_layers: 6
  hidden_width: 128
  activation: "sin"
  first_omega_0: 30.0
  hidden_omega_0: 30.0
  fourier_features: false
  n_fourier: 64
  fourier_scale: 10.0
  hard_constraint: "exp"
  hard_constraint_scale: 1.0
  hard_constraint_power: 2

# ── Velocity network ──
velocity_net:
  hidden_layers: 6
  hidden_width: 128
  activation: "tanh"
  fourier_features: true
  n_fourier: 128
  fourier_scale: 8.0
  output_activation: "sigmoid"   # scaled to [vp_min, vp_max]

# ── Training ──
training:
  n_epochs: 1000
  warmup_epochs: 100
  lr_pinn: 1.0e-4
  lr_vp: 1.0e-4
  alternating_updates: true
  warmup_pinn_only_epochs: 100
  pinn_steps_per_cycle: 1
  vp_steps_per_cycle: 2
  use_frequency_continuation: true
  freq_start_hz: 2.0
  freq_end_hz: 12.0
  freq_ramp_epochs: 700
  n_data_receivers: 32
  data_normalization: "rms"
  scheduler_step: 1000
  scheduler_gamma: 0.5
  grad_clip: 1.0             # max gradient norm
  grad_clip_value: 0.0
  skip_nonfinite_steps: true
  n_collocation: 20000
  n_bc: 2000
  n_ic: 2000
  n_data_batch: 4096
  shots_per_batch: 8
  source_bias_ratio: 0.30
  source_bias_sigma: 0.05
  source_sigma: 0.02
  source_amplitude: 1.0

# ── Loss weights ──
# After non-dimensionalization the PDE residual terms are O(1), so
# PDE weight can be meaningful (not 1e-13).  Two-phase scheduler
# ramps PDE UP during warmup, then ramps data UP after.
weights:
  w_pde_start: 0.1
  w_pde: 12.0
  w_data_start: 1.0
  w_data: 60.0
  w_ic_start: 50.0           # high IC weight early to anchor u(t=0)=0
  w_ic_end: 5.0
  w_bc: 0.1
  w_reg: 5e-4
  w_smooth: 2e-6
  w_tv: 2e-5
  w_charbonnier: 3e-5
  charbonnier_epsilon: 5.0
  charbonnier_alpha: 0.45
  w_bounds: 1e-3
  causal_epsilon: 5.0        # causal temporal weighting strength
  causal_chunks: 24
  causal_min_weight: 1e-3
  adaptive_data_weight: true
  data_weight_min_scale: 0.5
  data_weight_max_scale: 8.0
  data_weight_beta: 0.5

# ── Logging ──
logging:
  print_every: 100
  plot_every: 200
  checkpoint_every: 500
  results_dir: "results"

# ── Device ──
device: "auto"          # "auto", "cpu", or "cuda"
